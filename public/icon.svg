<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0B08"/>
      <stop offset="100%" stop-color="#141108"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D06A"/>
      <stop offset="50%" stop-color="#C8A84B"/>
      <stop offset="100%" stop-color="#B8982B"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E080"/>
      <stop offset="100%" stop-color="#C8A84B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chair icon -->
  <g transform="translate(256,240)" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Seat -->
    <path d="M-80,20 L80,20 L80,40 Q80,60 60,60 L-60,60 Q-80,60 -80,40 Z" fill="url(#gold)" opacity="0.15" stroke="url(#gold)"/>
    <!-- Backrest -->
    <path d="M-60,-80 Q-60,-100 -40,-100 L40,-100 Q60,-100 60,-80 L60,20 L-60,20 Z" fill="url(#gold)" opacity="0.08" stroke="url(#gold)"/>
    <!-- Legs -->
    <line x1="-60" y1="60" x2="-70" y2="120"/>
    <line x1="60" y1="60" x2="70" y2="120"/>
    <!-- Base -->
    <line x1="-90" y1="120" x2="90" y2="120"/>
    <!-- Armrests -->
    <path d="M-80,0 L-100,0 Q-110,0 -110,10 L-110,30" />
    <path d="M80,0 L100,0 Q110,0 110,10 L110,30" />
  </g>
  <!-- CM Text -->
  <text x="256" y="380" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="42" fill="url(#gold2)" letter-spacing="8">CHAIRMATCH</text>
</svg>
